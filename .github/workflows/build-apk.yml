name: Build APK + Deploy OTA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout mobile repo
        uses: actions/checkout@v4

      - name: Checkout web repo (source of truth)
        uses: actions/checkout@v4
        with:
          repository: ShaharMeriash/perth-relocation-commander
          path: web-source

      - name: Sync source files from web repo
        run: |
          cp web-source/src/App.jsx src/App.jsx
          cp web-source/src/main.jsx src/main.jsx
          cp web-source/index.html index.html
          cp web-source/public/icon.svg public/icon.svg

      - name: Inject Capgo notifyAppReady into main.jsx
        run: |
          printf 'import { CapacitorUpdater } from "@capgo/capacitor-updater";\nCapacitorUpdater.notifyAppReady();\n%s' "$(cat src/main.jsx)" > src/main.jsx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload OTA bundle to Capgo
        run: npx @capgo/cli@latest bundle upload -a ${{ secrets.CAPGO_TOKEN }} --channel production
        continue-on-error: true  # don't fail full build if Capgo token not set yet

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon from SVG
        run: |
          sudo apt-get install -y librsvg2-bin
          mkdir -p assets
          rsvg-convert -w 1024 -h 1024 public/icon.svg > assets/icon.png
          rsvg-convert -w 2732 -h 2732 public/icon.svg > assets/splash.png

      - name: Generate Android icon sizes
        run: npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: perth-relocation-commander-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
